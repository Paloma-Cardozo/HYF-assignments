<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Database</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">Welcome to the Users Database</h1>
    <p class="subtitle">
      Below is the total number of users stored in our database:
    </p>
    <div class="users-container" id="users-container"></div>
    <script>
      fetch("/users-count")
        .then((response) => response.json())
        .then((data) => {
          const usersContainer = document.getElementById("users-container");
          const countValue =
            data.count !== undefined ? data.count : Object.values(data)[0];

          usersContainer.innerHTML = `<div class="user-card"><h2 class="user-card-title">Total Users:</h2><p class="user-count">${countValue}</p></div>`;
        })
        .catch((error) => {
          console.error("Error fetching users count:", error);
        });
    </script>
  </body>
</html>
