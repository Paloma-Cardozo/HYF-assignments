<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hogwarts House Generator</title>
  </head>

  <body>
    <h1>
      <img src="images\magic-wand.gif" alt="Magic Wand" width="60" />
      Hogwarts House generator
      <img src="images\magic-wand.gif" alt="Magic Wand" width="60" />
    </h1>

    <h2>
      <img src="images\witch-hat.gif" alt="Witch Hat" width="60" />
      Which Hogwarts House do you belong to?
    </h2>
    <input
      type="text"
      id="name-input"
      placeholder="Enter your magician name"
      style="font-size: 20px; padding: 12px; border-radius: 8px" />
    <button id="generator-button">Generate!</button>
    <p id="result"></p>
    <div id="house-gif-container"></div>

    <h2>
      <img src="images\warlock.gif" alt="Warlock" width="60" />
      Magic facts for you!
    </h2>
    <div id="character-container"></div>

    <script src="index.js"></script>
  </body>
</html>
